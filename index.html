<title>AntQuest · มดน้อยนักสำรวจ</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<style>
  :root{--bg:#0f1626;--panel:#1a2238;--panel2:#232d49;--panel3:#2b3656;--line:#37456a;--ink:#eef2fb;--muted:#a6b1d4;
    --primary:#6d72ff;--primary2:#9aa0ff;--accent:#1db98a;--gold:#ffc24a;--danger:#ff6b7e;
    --move:#1f9e76;--turn:#a8680f;--loop:#3f5ad6;--cond:#c44d7e;--func:#1a9fc2;--get:#9a4db0;
    --shadow:0 2px 12px rgba(0,0,0,.28);--font:'Nunito','Noto Sans Thai',system-ui,sans-serif;--mono:'JetBrains Mono','Consolas',monospace;}
  *{box-sizing:border-box}html,body{height:100%}
  body{margin:0;font-family:var(--font);color:var(--ink);height:100vh;overflow:hidden;display:flex;flex-direction:column;font-size:15px;
    background:radial-gradient(1200px 700px at 88% -20%,#222d52 0,transparent 55%),radial-gradient(900px 600px at -10% 120%,#2a2150 0,transparent 50%),var(--bg);}
  button{font-family:var(--font)}

  header{flex:none;display:flex;align-items:center;gap:10px;padding:10px 18px;flex-wrap:wrap;background:rgba(15,22,38,.9);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);z-index:30}
  .logo{font-size:21px;font-weight:900;display:flex;align-items:center;gap:8px}
  .logo .dot{font-size:20px;line-height:1}
  header .spacer{flex:1}
  .segwrap{display:inline-flex;background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:4px;gap:4px}
  .tab{border:none;background:transparent;color:var(--muted);font-weight:800;font-size:13.5px;padding:8px 16px;border-radius:9px;cursor:pointer;display:flex;gap:6px;align-items:center}
  .tab.active{background:var(--primary);color:#fff}.tab.coding.active{background:var(--accent);color:#03251f}
  .totStars{font-weight:800;font-size:15px;color:var(--gold)}
  .navgrp{display:flex;align-items:center;gap:4px;background:var(--panel2);border:1px solid var(--line);border-radius:11px;padding:4px}
  .navbtn{background:transparent;border:none;color:var(--ink);font-size:15px;font-weight:800;width:28px;height:30px;border-radius:7px;cursor:pointer}
  .navbtn:hover{background:rgba(109,114,255,.3)}.navbtn:disabled{opacity:.3;cursor:not-allowed}
  .lvlbtn{background:transparent;border:none;color:var(--ink);font-weight:800;font-size:13.5px;padding:5px 10px;border-radius:8px;cursor:pointer;width:210px;white-space:nowrap;overflow:hidden;display:flex;gap:7px;align-items:center}
  .lvlbtn>span{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:center}
  .lvlbtn:hover{background:rgba(109,114,255,.25)}
  .iconbtn{background:var(--panel2);border:1px solid var(--line);color:var(--ink);border-radius:10px;padding:7px 11px;cursor:pointer;font-weight:800;font-size:14px}
  .iconbtn:hover{border-color:var(--primary)}
  main{flex:1;min-height:0;display:grid;grid-template-columns:minmax(300px,1.15fr) minmax(310px,0.92fr);gap:14px;padding:12px 16px;overflow:hidden}
  @media(max-width:1000px){body{overflow:auto;height:auto;min-height:100vh}main{grid-template-columns:1fr;overflow:visible;gap:12px}.card{min-height:auto}.canvaswrap{min-height:46vh}}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:16px;box-shadow:var(--shadow);display:flex;flex-direction:column;min-height:0;overflow:hidden}
  .goalbar{flex:none;display:flex;align-items:center;gap:8px;background:var(--panel2);border-left:3px solid var(--gold);padding:7px 11px;border-radius:10px;margin:0 0 8px}
  .goalbar .gtext{font-size:13.5px;line-height:1.3;color:#eaf0ff;font-weight:600;flex:1;min-width:0}
  .goalbar .gtext b{color:var(--gold)}
  .obsbar{flex:none;font-size:13px;color:#bfe9dc;background:rgba(25,211,184,.1);border-left:4px solid var(--accent);padding:7px 12px;border-radius:9px;margin:-2px 0 10px;font-weight:700}
  .obsbar b{color:#7fe7d8}
  .ginfo{flex:none;display:flex;align-items:center;gap:6px;background:rgba(25,211,184,.16);border:1px solid #1f6b61;color:#7fe7d8;border-radius:999px;font-size:12.5px;font-weight:800;padding:6px 12px;cursor:pointer;white-space:nowrap}
  .ginfo:hover{background:rgba(25,211,184,.3)}
  .diff{font-weight:800;color:var(--gold);letter-spacing:1px}.diff .o{color:#4a5680}
  .canvaswrap{flex:1;min-height:0;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;border-radius:14px;background:#0e1424;border:1px solid var(--line)}
  canvas{display:block;border-radius:10px;max-width:100%;max-height:100%}
  .msg{position:absolute;left:10px;right:10px;bottom:10px;z-index:5;padding:11px 14px;border-radius:12px;font-weight:800;font-size:15px;display:none;align-items:center;gap:10px;animation:fade .25s ease;box-shadow:0 8px 22px rgba(0,0,0,.5)}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .msg.ok{display:flex;background:#11352f;border:1px solid var(--accent);color:#a9f3e6}

<script>
/* ========================= ENGINE: interpreters (runPython + runBlocks) =========================
   NOTE: this engine is mirrored in worldcore.js (the canonical copy used by validate.js).
   Change behavior here → mirror it there. `node validate.js` runs a drift guard that fails otherwise. */
const MAX_STEPS=8000;class GameError extends Error{}
function tokenizeLines(src){const out=[];const raw=src.replace(/\t/g,'    ').split('\n');for(let n=0;n<raw.length;n++){let line=raw[n];const h=line.indexOf('#');if(h>=0)line=line.slice(0,h);if(line.trim()==='')continue;const indent=line.length-line.trimStart().length;out.push({indent,text:line.trim(),line:n+1});}return out;}
function buildBlocks(lines,i,pi){const stmts=[];while(i<lines.length&&lines[i].indent>pi){const c=lines[i];if(c.text.endsWith(':')){const header=c.text.slice(0,-1).trim();const r=buildBlocks(lines,i+1,c.indent);stmts.push({header,body:r.stmts,line:c.line});i=r.next;}else{stmts.push({header:null,text:c.text,line:c.line});i++;}}return{stmts,next:i};}
function lexExpr(s){const t=[];const re=/\s*(>=|<=|==|!=|\/\/|[-+*/()%,<>]|[A-Za-z_]\w*|\d+\.?\d*)/y;let m,p=0;while(p<s.length){re.lastIndex=p;m=re.exec(s);if(!m)throw new GameError('อ่านนิพจน์ไม่ได้ / Cannot parse');t.push(m[1]);p=re.lastIndex;if(p===m.index&&m[0]==='')break;}return t;}

function gridCells(g){return g.cols*g.rows-((g.walls||[]).length);}
function nestDepthA(arr){let mx=0;(function rec(a,d){for(const n of a){if(n.body||n.elseBody){mx=Math.max(mx,d+1);rec([...(n.body||[]),...(n.elseBody||[])],d+1);}}})(arr,0);return mx;}
function codeDepthS(src){let mx=0;src.split('\n').forEach(l=>{if(l.trim()){const ind=(l.match(/^ */)[0].length)/4;mx=Math.max(mx,ind);}});return mx;}
function difficultyOf(lv){const g=lv.grid;const cells=gridCells(g);const tier=TIER[lv.topic]||1;const par=levelPar(lv);const depth=lv.mode==='block'?nestDepthA(lv.solution):codeDepthS(lv.solution_code);const rand=g.gen?1:0;const raw=tier*1.5+Math.min(cells,45)/9+Math.min(par,16)/4+depth*1.1+rand*1.3;return Math.max(1,Math.min(5,Math.round(raw/3.0)));}
function diffDots(n){let s='';for(let i=0;i<5;i++)s+=(i<n?'●':'<span class="o">○</span>');return s;}
function topicDiff(key){let arr=LEVELS.filter(l=>l.topic===key&&l.track===currentTrack);if(!arr.length)arr=LEVELS.filter(l=>l.topic===key);if(!arr.length)return 1;return Math.round(arr.reduce((a,l)=>a+difficultyOf(l),0)/arr.length);}

function doUndo(){if(!undoStack.length)return;const s=JSON.parse(undoStack.pop());program=s.p;defBody=s.a;def2Body=s.b;renderProgram();updateUndoBtn();}

function clone(arr){return arr.map(n=>{const o={...n,_id:uid++};if(n.body)o.body=clone(n.body);if(n.elseBody)o.elseBody=clone(n.elseBody);return o;});}
function countNodes(a){let n=0;for(const x of a){n++;if(x.body)n+=countNodes(x.body);if(x.elseBody)n+=countNodes(x.elseBody);}return n;}
function countCodeLines(src){return src.split('\n').map(l=>{const h=l.indexOf('#');return(h>=0?l.slice(0,h):l).trim();}).filter(Boolean).length;}
function levelPar(lv){return lv.mode==='block'?countNodes(lv.solution):countCodeLines(lv.solution_code);}
function starsFor(u,p){if(u<=p)return 3;if(u<=Math.ceil(p*1.6))return 2;return 1;}
function realGrid(){const g=curLevel.grid;if(g.gen){const r=g.gen();return{...g,stars:r.stars||g.stars,poison:r.poison||g.poison,water:r.water||g.water};}return g;}

function newNode(type){const n={type,_id:uid++};
  if(type==='repeat'){n.count=3;n.body=[];}if(type==='while'){n.cond=robot.condKeys[0];n.body=[];}
  if(type==='if'){n.cond=robot.condKeys[0];n.body=[];}if(type==='ifelse'){n.cond=robot.condKeys[0];n.body=[];n.elseBody=[];}
  if(type==='def'){n.name='do';n.body=[];}if(type==='call'){n.name='do';}
  if(type==='def2'){n.name='go';n.body=[];}if(type==='call2'){n.name='go';}return n;}
function _loc(id,arr){for(let i=0;i<arr.length;i++){if(arr[i]._id===id)return{arr,idx:i};if(arr[i].body){const r=_loc(id,arr[i].body);if(r)return r;}if(arr[i].elseBody){const r=_loc(id,arr[i].elseBody);if(r)return r;}}return null;}
function locate(id,arr){if(arr)return _loc(id,arr);for(const root of [program,defBody,def2Body]){const r=_loc(id,root);if(r)return r;}return null;}
function removeNode(id){const l=locate(id);if(l)return l.arr.splice(l.idx,1)[0];return null;}
function containsArr(node,arr){if(!node)return false;if(node.body===arr||node.elseBody===arr)return true;return[...(node.body||[]),...(node.elseBody||[])].some(c=>containsArr(c,arr));}
function plabel(type){return T[lang][metaFor(type).key]||type;}
function condOptions(sel){return robot.condKeys.map(c=>`<option value="${c}" ${c===sel?'selected':''}>${T[lang]['cond_'+c]}</option>`).join('');}

function snipFor(type){if(SNIP[type])return SNIP[type];const leaf=robot.leaf({type});return leaf?leaf+'\n':'';}
function insertSnippet(type){const ta=$('codeArea');const s=snipFor(type);const a=(ta.selectionStart==null)?ta.value.length:ta.selectionStart,b=(ta.selectionEnd==null)?a:ta.selectionEnd;ta.value=ta.value.slice(0,a)+s+ta.value.slice(b);const pos=a+s.length;ta.focus();try{ta.selectionStart=ta.selectionEnd=pos;}catch(e){}}
function renderPalette(){const p=$('palette');const codeMode=curLevel.mode==='code';p.className='palette'+(codeMode?' codemode':'');p.innerHTML='';(curLevel.palette||[]).forEach(type=>{
  if(codeMode){const el=document.createElement('div');el.className='cmdchip';el.textContent=CODELBL[type]||(robot.leaf({type})||'');el.title=(TIP[lang]&&TIP[lang][type])||'';el.addEventListener('click',()=>insertSnippet(type));p.appendChild(el);return;}
  if(type==='def'||type==='def2')return; /* def becomes a fixed window, not a chip */
  const m=metaFor(type),el=document.createElement('div');el.className='pblock '+m.cls;el.draggable=true;el.title=(TIP[lang]&&TIP[lang][type])||'';el.innerHTML='<span class="ic">'+m.ic+'</span><span class="pl">'+plabel(type)+'</span>';el.addEventListener('dragstart',e=>e.dataTransfer.setData('text/plain','new:'+type));el.addEventListener('click',()=>{snapEdit();activeArr().push(newNode(type));renderProgram();});p.appendChild(el);
});}
function makeZone(arr){const z=document.createElement('div');z.className='dropzone'+(arr.length?'':' empty');z._arr=arr;z.dataset.ph=T[lang].drop;
  z.addEventListener('dragover',e=>{e.preventDefault();z.classList.add('over');});z.addEventListener('dragleave',()=>z.classList.remove('over'));
  z.addEventListener('drop',e=>{e.preventDefault();e.stopPropagation();z.classList.remove('over');handleDrop(e,arr,arr.length);});
  arr.forEach(node=>z.appendChild(renderBlock(node)));return z;}
function renderBlock(node){const m=metaFor(node.type),b=document.createElement('div');b.className='block '+m.cls;b.draggable=true;b.dataset.bid=node._id;
  b.addEventListener('dragstart',e=>{e.stopPropagation();e.dataTransfer.setData('text/plain','move:'+node._id);});
  b.addEventListener('drop',e=>{e.preventDefault();e.stopPropagation();const l=locate(node._id);if(l)handleDrop(e,l.arr,l.idx);});
  b.addEventListener('dragover',e=>{e.preventDefault();e.stopPropagation();});
  const head=document.createElement('div');head.className='bhead';head.innerHTML='<span class="ic">'+m.ic+'</span><span class="blabel">'+plabel(node.type)+'</span>';
  if(node.type==='repeat'){const inp=document.createElement('input');inp.type='number';inp.min='0';inp.max='40';inp.value=node.count;inp.className='cnt';inp.addEventListener('change',()=>node.count=Math.max(0,parseInt(inp.value)||0));head.appendChild(inp);const t=document.createElement('span');t.textContent=T[lang].times;t.style.cssText='font-weight:800;font-size:12.5px;opacity:.9';head.appendChild(t);}
  if(node.type==='while'||node.type==='if'||node.type==='ifelse'){const sel=document.createElement('select');sel.className='condsel';sel.innerHTML=condOptions(node.cond);sel.addEventListener('change',()=>node.cond=sel.value);head.appendChild(sel);}
  const ctl=document.createElement('div');ctl.className='bctl';ctl.innerHTML='<button>▲</button><button>▼</button><button>✕</button>';
  const[up,dn,del]=ctl.querySelectorAll('button');
  up.onclick=()=>{const l=locate(node._id);if(l&&l.idx>0){snapEdit();[l.arr[l.idx-1],l.arr[l.idx]]=[l.arr[l.idx],l.arr[l.idx-1]];renderProgram();}};
  dn.onclick=()=>{const l=locate(node._id);if(l&&l.idx<l.arr.length-1){snapEdit();[l.arr[l.idx+1],l.arr[l.idx]]=[l.arr[l.idx],l.arr[l.idx+1]];renderProgram();}};
  del.onclick=()=>{snapEdit();removeNode(node._id);renderProgram();};head.appendChild(ctl);b.appendChild(head);
  if(node.body){const bd=document.createElement('div');bd.className='bbody';bd.appendChild(makeZone(node.body));b.appendChild(bd);}
  if(node.elseBody){const e=document.createElement('div');e.className='belse';e.innerHTML=STRUCT.ifelse.ic+' '+T[lang].elsew;b.appendChild(e);const eb=document.createElement('div');eb.className='bbody';eb.appendChild(makeZone(node.elseBody));b.appendChild(eb);}
  return b;}
function handleDrop(e,targetArr,index){const data=e.dataTransfer.getData('text/plain');if(!data)return;let node;
  if(data.startsWith('new:'))node=newNode(data.slice(4));
  else if(data.startsWith('move:')){const id=parseInt(data.slice(5));const l=locate(id);if(l&&containsArr(l.arr[l.idx],targetArr))return;node=removeNode(id);if(!node)return;}
  if(!node)return;snapEdit();index=Math.min(index,targetArr.length);targetArr.splice(index,0,node);renderProgram();}
function renderZoneInto(id,arr){const z=$(id);if(!z)return;const fresh=makeZone(arr);fresh.id=id;z.replaceWith(fresh);}
function renderProgram(){renderZoneInto('rootZone',program);if(useFunc)renderZoneInto('defZoneA',defBody);if(useFunc2)renderZoneInto('defZoneB',def2Body);}
function blocksToCode(program){const out=[];
  function emit(ns,ind){const pad='    '.repeat(ind);for(const n of ns){switch(n.type){
    case'repeat':out.push(pad+'for i in range('+(n.count||0)+'):');body(n.body,ind,pad);break;
    case'while':out.push(pad+'while '+robot.pycond(n.cond)+':');body(n.body,ind,pad);break;
    case'if':out.push(pad+'if '+robot.pycond(n.cond)+':');body(n.body,ind,pad);break;
    case'ifelse':out.push(pad+'if '+robot.pycond(n.cond)+':');body(n.body,ind,pad);out.push(pad+'else:');body(n.elseBody,ind,pad);break;
    case'def':case'def2':out.push(pad+'def '+(n.name||'do')+'():');body(n.body,ind,pad);out.push('');break;
    case'call':case'call2':out.push(pad+(n.name||'do')+'()');break;default:out.push(pad+robot.leaf(n));}}}
  function body(b,ind,pad){(b&&b.length)?emit(b,ind+1):out.push(pad+'    pass');}
  emit(program,0);return out.join('\n').trim();}

function spawnConfetti(){const cols=['#19d3b8','#6d72ff','#ffc848','#ff5fb0','#4d8cff'];for(let i=0;i<100;i++)particles.push({x:boardW/2+(Math.random()-0.5)*180,y:boardH*0.32,vx:(Math.random()-0.5)*7,vy:Math.random()*-7-2,g:0.24,life:1,fade:0.009,size:4+Math.random()*5,col:cols[i%cols.length],rot:Math.random()*6,vr:(Math.random()-0.5)*0.4});}
function spawnSparkle(px,py){for(let i=0;i<14;i++)particles.push({x:px,y:py,vx:(Math.random()-0.5)*4.5,vy:(Math.random()-0.5)*4.5-1,g:0.1,life:1,fade:0.03,size:2+Math.random()*3,col:Math.random()<.5?'#f7e08a':'#86efd8',rot:0,vr:0,spark:true});}
function updateParticles(){for(const p of particles){p.x+=p.vx;p.y+=p.vy;p.vy+=p.g;p.rot+=p.vr;p.life-=p.fade;}particles=particles.filter(p=>p.life>0&&p.y<boardH+40);}
function drawParticles(){for(const p of particles){ctx.save();ctx.globalAlpha=Math.max(0,p.life);ctx.translate(p.x,p.y);ctx.rotate(p.rot);ctx.fillStyle=p.col;if(p.spark){ctx.beginPath();ctx.arc(0,0,p.size,0,7);ctx.fill();}else ctx.fillRect(-p.size/2,-p.size/2,p.size,p.size*0.62);ctx.restore();}}
function nowt(){return(window.performance&&performance.now)?performance.now():Date.now();}
function renderLoop(t){updateParticles();if(displayFrame&&curGrid){let tn=tweenDur>0?(t-tweenStart)/tweenDur:1;draw(viewLerp(prevFrame,displayFrame,tn),t);drawParticles();}requestAnimationFrame(renderLoop);}
requestAnimationFrame(renderLoop);

function clearHighlight(){document.querySelectorAll('.block.running,.block.failed').forEach(e=>e.classList.remove('running','failed'));const rl=$('runline');if(rl)rl.classList.remove('fail');}
function failAt(src){if(src==null)return;
  if(curLevel.mode==='block'){const el=document.querySelector('[data-bid="'+src+'"]');if(el){el.classList.add('failed');try{el.scrollIntoView({block:'nearest'});}catch(e){}}}
  else{const rl=$('runline'),t=($('codeArea').value.split('\n')[src-1]||'').trim();rl.style.display='block';rl.classList.add('fail');rl.textContent='✖ '+T[lang].runline+' '+src+': '+t;}}
function updateRunline(fr){const rl=$('runline');if(curLevel&&curLevel.mode==='code'&&fr&&fr.src!=null){const t=($('codeArea').value.split('\n')[fr.src-1]||'').trim();rl.style.display='block';rl.textContent='▶ '+T[lang].runline+' '+fr.src+': '+t;}else{rl.style.display='none';rl.textContent='';}}
function highlight(fr){clearHighlight();if(curLevel&&curLevel.mode==='block'&&fr&&fr.src!=null){const el=document.querySelector('[data-bid="'+fr.src+'"]');if(el)el.classList.add('running');}updateRunline(fr);}
function setFrame(prev,fr,dur){prevFrame=prev;displayFrame=fr;tweenStart=nowt();tweenDur=dur;
  if(fr.action==='move')sMove();else if(fr.action==='turnL'||fr.action==='turnR')sTurn();else if(fr.action==='collect')sCollect();
  if(prev&&fr.stars&&prev.stars&&fr.stars.length<prev.stars.length){const gone=prev.stars.find(g=>!fr.stars.includes(g));if(gone){const[gx,gy]=gone.split(',').map(Number);spawnSparkle(gridT.ox+gx*gridT.cs+gridT.cs/2,gridT.oy+gy*gridT.cs+gridT.cs/2);}}
  highlight(fr);}
function execute(){curGrid=realGrid();applyCanvasSize();const m=robot.make(curGrid);let err=null;const prog=buildProgram();const used=curLevel.mode==='block'?countNodes(prog):countCodeLines($('codeArea').value);
  try{if(curLevel.mode==='block')runBlocks(prog,m,robot.actions(m),robot.conds);else runPython($('codeArea').value,m,robot.py(m));}catch(e){err=e;}return{m,err,used,frames:m.frames};}
function showMsg(type,html){const m=$('msg');m.className='msg '+(type==='ok'?'ok':'bad');m.innerHTML=html;}
function clearMsg(){$('msg').className='msg';$('msg').innerHTML='';}
function starHTML(n){let h='<span class="stars">';for(let i=0;i<3;i++)h+='<span class="star'+(i<n?' on':'')+'">★</span>';return h+'</span>';}
function localErr(e){const p=e.message.split('/');return lang==='th'?p[0].trim():(p[1]||p[0]).trim();}
function overLimit(){if(!curLevel.limit)return false;const used=curLevel.mode==='block'?countNodes(buildProgram()):countCodeLines($('codeArea').value);return used>curLevel.limit;}
function finalize(r){clearHighlight();
  if(r.err){const reason=localErr(r.err);failAt(r.m.src);showMsg('bad','⚠ '+reason);sError();}
  else if(r.m.won()){finishWin(r.used);sWin();spawnConfetti();}
  else{const reason=r.m.atGoal()?T[lang].lose_food:T[lang].lose_nest;showMsg('bad','😅 '+reason);sError();}}
function runProgram(){if(animating)return;if(overLimit()){showMsg('bad','🚫 '+T[lang].overlimit);sError();return;}stepState=null;clearMsg();const r=execute();const frames=r.frames;let i=1;const tickMs=parseInt($('speed').value)||300;
  if(frames.length<=1){finalize(r);return;}animating=true;$('runBtn').disabled=true;$('stepBtn').disabled=true;
  animTimer=setInterval(()=>{setFrame(frames[i-1],frames[i],Math.min(tickMs,200));i++;if(i>=frames.length){clearInterval(animTimer);animating=false;$('runBtn').disabled=false;$('stepBtn').disabled=false;finalize(r);}},tickMs);}
function stepOnce(){if(animating)return;clearMsg();
  if(!stepState){if(overLimit()){showMsg('bad','🚫 '+T[lang].overlimit);sError();return;}stepState=execute();stepState.i=0;prevFrame=stepState.frames[0];displayFrame=stepState.frames[0];tweenDur=0;highlight(stepState.frames[0]);return;}
  stepState.i++;const i=stepState.i;setFrame(stepState.frames[i-1],stepState.frames[i],180);
  if(i>=stepState.frames.length-1){const done=stepState;stepState=null;finalize(done);}}
function finishWin(used){const par=levelPar(curLevel),st=starsFor(used,par);if(st>bestStars[cur]){bestStars[cur]=st;saveProgress();}
  const tip=st===3?T[lang].star3:T[lang].nudge3.replace('{n}',par);
  showMsg('ok','<span>'+T[lang].win+'<br><small style="font-weight:700;opacity:.85">'+tip+'</small></span>'+starHTML(st));
  $('scoreline').textContent=T[lang].used+' '+used+' '+T[lang].cmds+' · '+T[lang].par+' '+par+' · '+T[lang].best+' '+'★'.repeat(bestStars[cur]);
  updateTotals();buildSelect();if(bestStars.every(s=>s>0))setTimeout(()=>showMsg('ok',T[lang].allDone+' '+starHTML(3)),500);}
function showCode(){const prog=buildProgram();$('modalTitle').textContent=T[lang].equivCode;$('codeOut').textContent=prog.length?blocksToCode(prog):T[lang].noBlocks;$('codeModal').classList.add('open');}

function levelIdx(){const a=[];LEVELS.forEach((l,i)=>{if(l.track===currentTrack)a.push(i);});a.sort((x,y)=>topNum(LEVELS[x].topic)-topNum(LEVELS[y].topic));return a;}
function firstOf(track){const ids=LEVELS.map((l,i)=>l.track===track?i:-1).filter(i=>i>=0);if(!ids.length)return 0;const u=ids.find(i=>!bestStars[i]);return u!=null?u:ids[0];}
function updateTabs(){$('tabNocode').classList.toggle('active',currentTrack==='nocode');$('tabCoding').classList.toggle('active',currentTrack==='coding');}
function switchTrack(tk){if(currentTrack===tk)return;const cl=curLevel;currentTrack=tk;let idx=LEVELS.findIndex(l=>l.track===tk&&l.topic===cl.topic&&l.sub.en===cl.sub.en);if(idx<0)idx=firstOf(tk);loadLevel(idx);}
function topicMeta(key){return TOPICS.find(t=>t.key===key);}
function topNum(key){return TOPICS.findIndex(t=>t.key===key)+1;}
function topName(tp){return tp[lang].replace(/^\d+/,topNum(tp.key));}
function lvlName(lv){return lv.sub[lang].replace(/^\d+\./,topNum(lv.topic)+'.');}
function openTopic(){const t=topicMeta(curLevel.topic);if(!t||!t.desc)return;$('topicModalTitle').textContent='📖 '+topName(t);const cts=(curLevel.ct||CTDEF[curLevel.topic]||[]).map(k=>T[lang]['ct_'+k]).join(' · ');const d=difficultyOf(curLevel);
  $('topicModalBody').innerHTML='<p style="margin:0 0 12px">'+t.desc[lang]+'</p><div style="font-size:12.5px;color:#a6b1d4;font-weight:700;background:var(--panel2);border-radius:9px;padding:9px 12px">🧠 '+T[lang].ctSkills+': '+cts+' &nbsp;·&nbsp; '+T[lang].difficulty+' <span class="diff">'+diffDots(d)+'</span></div>';$('topicModal').classList.add('open');}
function openCmd(){$('cmdTitle').textContent='📖 '+T[lang].cmdTitle;$('cmdBody').innerHTML=CMDHELP.map(h=>'<div class="helprow"><span class="hi">'+h.ic+'</span><div><b>'+h.b[lang]+'</b> · <code>'+h.c+'</code><br>'+h.d[lang]+'</div></div>').join('');$('cmdModal').classList.add('open');}
function loadLevel(idx){if(animTimer){clearInterval(animTimer);animTimer=null;}animating=false;stepState=null;particles=[];
  cur=idx;curLevel=LEVELS[idx];currentTrack=curLevel.track;updateTabs();curGrid=realGrid();
  $('runBtn').disabled=false;$('stepBtn').disabled=false;clearMsg();$('hintBox').style.display='none';$('scoreline').textContent='';clearHighlight();
  const d=difficultyOf(curLevel);$('lvlBtnLabel').textContent=lvlName(curLevel);$('goalDiff').innerHTML=diffDots(d);
  let goalHtml=curLevel.goal[lang];if(curLevel.limit)goalHtml+=' <b>('+T[lang].limit+' ≤ '+curLevel.limit+' '+T[lang].cmds+')</b>';$('goalText').innerHTML='<i class="ti ti-target" style="color:var(--gold)"></i> '+goalHtml;
  $('obsBar').style.display='none';
  $('hintBox').textContent=curLevel.hint[lang];$('showCodeBtn').style.display=curLevel.mode==='block'?'':'none';$('stepsBtn').style.display=curLevel.steps?'':'none';
  $('undoBtn').style.display=curLevel.mode==='block'?'':'none';undoStack=[];updateUndoBtn();
  if(curLevel.mode==='block'){$('blockEditor').style.display='';$('codeEditor').style.display='none';$('editorTitle').textContent=T[lang].editorBlock;
    program=[];defBody=[];def2Body=[];
    useFunc=(curLevel.palette||[]).includes('def');useFunc2=(curLevel.palette||[]).includes('def2');
    $('defWrap').style.display=useFunc?'':'none';$('zwB').style.display=useFunc2?'':'none';$('mainLabel').style.display=useFunc?'':'none';
    $('lblA').innerHTML='<i class="ti ti-package"></i> '+(lang==='th'?'นิยาม do()':'define do()');$('lblB').innerHTML='<i class="ti ti-package"></i> '+(lang==='th'?'นิยาม go()':'define go()');$('mainLabel').innerHTML='<i class="ti ti-player-play"></i> '+(lang==='th'?'โปรแกรมหลัก':'main program');
    if(curLevel.prefill)curLevel.prefill.forEach(n=>{if(n.type==='def')defBody=clone(n.body||[]);else if(n.type==='def2')def2Body=clone(n.body||[]);else program.push(...clone([n]));});
    setActive(useFunc?'def':'main');renderProgram();}
  else{$('blockEditor').style.display='none';$('codeEditor').style.display='';$('editorTitle').textContent=T[lang].editorCode;$('codeArea').value=curLevel.prefill_code||curLevel.starter||'';useFunc=false;useFunc2=false;}
  renderPalette();
  updateRunline(null);buildSelect();sizeBoard();
  const f0=robot.frame0(curGrid);prevFrame=f0;displayFrame=f0;tweenDur=0;
  const ids=levelIdx(),p=ids.indexOf(idx);$('prevBtn').disabled=p<=0;$('nextBtn').disabled=p>=ids.length-1;
  const onb=$('onboard').classList.contains('open')||$('menu').classList.contains('open');
  if(!onb&&!seenTopics.has(curLevel.topic)){seenTopics.add(curLevel.topic);openTopic();}}
function openSteps(){if(!curLevel.steps)return;$('stepsTitle').textContent='📖 '+lvlName(curLevel);$('stepsBody').innerHTML=curLevel.steps[lang].map(s=>'<li>'+s+'</li>').join('');$('stepsModal').classList.add('open');}
function loadSolution(){if(curLevel.mode==='block'){snapEdit();program=[];defBody=[];def2Body=[];
    curLevel.solution.forEach(n=>{if(n.type==='def')defBody=clone(n.body||[]);else if(n.type==='def2')def2Body=clone(n.body||[]);else program.push(...clone([n]));});
    renderProgram();}else $('codeArea').value=curLevel.solution_code;}
function updateTotals(){$('totStars').textContent='★ '+bestStars.reduce((a,b)=>a+b,0)+'/'+(LEVELS.length*3);}
function buildSelect(){updateTotals();}
function buildPanel(){const body=$('lpbody');body.innerHTML='';$('lpTitle').textContent=T[lang].pickLevel;
  TOPICS.forEach(tp=>{const lvls=[];LEVELS.forEach((lv,i)=>{if(lv.track===currentTrack&&lv.topic===tp.key)lvls.push({lv,i});});if(!lvls.length)return;
    const det=document.createElement('details');det.className='lptopic';if(curLevel.topic===tp.key)det.open=true;
    const done=lvls.filter(({i})=>bestStars[i]>0).length,tot=lvls.length;
    const sum=document.createElement('summary');sum.innerHTML='<span>'+topName(tp)+'</span><span class="tprog'+(done===tot?' full':'')+'">'+done+'/'+tot+'</span><span class="tdiff">'+diffDots(topicDiff(tp.key))+'</span><span class="chev">▶</span>';det.appendChild(sum);
    lvls.forEach(({lv,i})=>{const b=document.createElement('button');b.className='lplevel'+(i===cur?' cur':'');const st=bestStars[i];let sv='';for(let k=0;k<3;k++)sv+=(k<st?'★':'<span class="o">★</span>');b.innerHTML='<span>'+lvlName(lv)+'</span><span class="lvstars">'+sv+'</span>';b.onclick=()=>{closePanel();loadLevel(i);};det.appendChild(b);});
    body.appendChild(det);});}
function openPanel(){buildPanel();$('levelPanel').classList.add('open');$('lpdrop').classList.add('open');}
function closePanel(){$('levelPanel').classList.remove('open');$('lpdrop').classList.remove('open');}
function buildOnboard(){$('obContent').innerHTML='<div class="obtitle">'+T[lang].onbTitle+'</div>'+T[lang].onbSteps.map(s=>'<div class="obstep">'+s+'</div>').join('');$('obStart').textContent=T[lang].start;}
function openOnboard(){buildOnboard();$('onboard').classList.add('open');}
function closeOnboard(){$('onboard').classList.remove('open');onboardSeen=true;saveProgress();}
function buildModeGrid(){const g=$('modeGrid');g.innerHTML='';const ns=LEVELS.filter(l=>l.track==='nocode').length,cs=LEVELS.filter(l=>l.track==='coding').length;
  const gotN=LEVELS.reduce((a,l,i)=>a+(l.track==='nocode'?bestStars[i]:0),0),gotC=LEVELS.reduce((a,l,i)=>a+(l.track==='coding'?bestStars[i]:0),0);
  const mk=(track,icon,name,desc,n,got)=>{const b=document.createElement('button');b.className='modecard';b.innerHTML='<span class="wi">'+icon+'</span><b>'+name+'</b><span>'+desc+'</span><i>'+n+' '+(lang==='th'?'ด่าน':'levels')+' · ★ '+got+'/'+(n*3)+'</i>';b.onclick=()=>{$('menu').classList.remove('open');currentTrack=track;loadLevel(firstOf(track));};return b;};
  g.appendChild(mk('nocode','🧩',T[lang].trkNocode,T[lang].modeBlock,ns,gotN));g.appendChild(mk('coding','⌨️',T[lang].trkCoding,T[lang].modeCode,cs,gotC));}
function openMenu(){buildModeGrid();$('menuSub').textContent=T[lang].menuPick;$('menu').classList.add('open');}
function applyLang(){document.documentElement.lang=lang;document.querySelectorAll('[data-i]').forEach(el=>el.textContent=T[lang][el.getAttribute('data-i')]);$('langBtn').textContent=lang==='th'?'EN':'ไทย';if($('onboard').classList.contains('open'))buildOnboard();if($('menu').classList.contains('open'))openMenu();updateTabs();updateTotals();loadLevel(cur);}
function updateMute(){$('muteBtn').innerHTML=muted?'<i class="ti ti-volume-off"></i>':'<i class="ti ti-volume"></i>';}

/* ----- DOM event wiring + boot ----- */
$('runBtn').onclick=runProgram;$('stepBtn').onclick=stepOnce;$('undoBtn').onclick=doUndo;$('resetBtn').onclick=()=>{if(hasWork()&&!confirm(T[lang].confirmReset))return;loadLevel(cur);};$('solBtn').onclick=loadSolution;$('showCodeBtn').onclick=showCode;
$('closeModal').onclick=()=>$('codeModal').classList.remove('open');$('codeModal').onclick=e=>{if(e.target.id==='codeModal')$('codeModal').classList.remove('open');};
$('stepsBtn').onclick=openSteps;$('closeSteps').onclick=()=>$('stepsModal').classList.remove('open');$('stepsModal').onclick=e=>{if(e.target.id==='stepsModal')$('stepsModal').classList.remove('open');};
$('closeTopic').onclick=()=>$('topicModal').classList.remove('open');$('topicModal').onclick=e=>{if(e.target.id==='topicModal')$('topicModal').classList.remove('open');};
$('cmdBtn').onclick=openCmd;$('menuCmd').onclick=openCmd;$('closeCmd').onclick=()=>$('cmdModal').classList.remove('open');$('cmdModal').onclick=e=>{if(e.target.id==='cmdModal')$('cmdModal').classList.remove('open');};
$('lvlBtn').onclick=openPanel;$('lpClose').onclick=closePanel;$('lpdrop').onclick=closePanel;
$('hintBtn').onclick=()=>{const h=$('hintBox');h.style.display=h.style.display==='none'?'block':'none';};
$('helpBtn').onclick=openOnboard;$('obStart').onclick=closeOnboard;$('menuHow').onclick=openOnboard;$('logoBtn').onclick=openMenu;
$('muteBtn').onclick=()=>{muted=!muted;updateMute();saveProgress();if(!muted)beep(660,0.08,'sine',0.05);};
$('prevBtn').onclick=()=>{const ids=levelIdx(),p=ids.indexOf(cur);if(p>0)loadLevel(ids[p-1]);};
$('nextBtn').onclick=()=>{const ids=levelIdx(),p=ids.indexOf(cur);if(p<ids.length-1)loadLevel(ids[p+1]);};
$('langBtn').onclick=()=>{lang=lang==='th'?'en':'th';applyLang();};
$('tabNocode').onclick=()=>switchTrack('nocode');$('tabCoding').onclick=()=>switchTrack('coding');
$('codeArea').addEventListener('keydown',e=>{if(e.key==='Tab'){e.preventDefault();const t=e.target,s=t.selectionStart;t.value=t.value.slice(0,s)+'    '+t.value.slice(t.selectionEnd);t.selectionStart=t.selectionEnd=s+4;}});
window.addEventListener('resize',()=>sizeBoard());
[['zwA','def'],['zwB','def2'],['zwM','main']].forEach(([id,z])=>{const el=$(id);if(el)el.addEventListener('mousedown',()=>setActive(z));});

loadProgress();updateMute();updateTabs();updateTotals();applyLang();
openMenu();
if(!onboardSeen)openOnboard();
</script>
</body>
